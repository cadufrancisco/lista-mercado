<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Lista de Compras</title>
  </head>
  <body>
    <div class="container">
      <h1>Lista de Compras</h1>

      <form id="listaForm">
        <input
          type="text"
          id="inputItem"
          placeholder="Digite um item para comprar"
        />
        <button type="submit" id="btnAdicionar">Adicionar</button>
      </form>

      <p id="resumo">Itens: 0 | Comprados: 0</p>

      <ul id="lista">
        <!-- Os itens vão aparecer aqui via JS -->
      </ul>

      <button id="btnLimpar" class="btn-secundario">Limpar Comprados</button>

      <p id="resumo">
        Itens: 0 | Comprados: 0 |
        <strong>Total: R$ <span id="valorTotal">0.00</span></strong>
      </p>

      <button id="btnFinalizar" class="btn-primario">Finalizar Compras</button>
      <div id="secaoHistorico">
        <h3>Histórico de Compras</h3>
        <ul id="listaHistorico"></ul>
      </div>
    </div>
    <!-- Janela Modal -->
    <div id="modalDetalhes" class="modal-overlay" style="display: none">
      <div class="modal-content">
        <span id="fecharModal" class="btn-fechar">&times;</span>
        <h2 id="modalTitulo">Detalhes da Compra</h2>
        <hr />
        <ul id="modalListaItens"></ul>
        <h3 id="modalTotal" style="text-align: right; color: #27ae60"></h3>
      </div>
    </div>

    <!-- Botão para limpar o histórico -->
    <button id="btnLimparHistorico">Limpar Todo Histórico</button>

    <script src="script.js"></script>
  </body>
</html>

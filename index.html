<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Lista de Compras</title>
  </head>
  <body>
    <div class="container">
      <h1>Lista de Compras</h1>

      <form id="listaForm">
        <input
          type="text"
          id="inputItem"
          placeholder="Digite um item para comprar"
        />
        <button type="submit" id="btnAdicionar">Adicionar</button>
      </form>

      <p id="resumo">Itens: 0 | Comprados: 0</p>

      <ul id="lista">
        <!-- Os itens vão aparecer aqui via JS -->
      </ul>

      <button id="btnLimpar" class="btn-secundario">Limpar Comprados</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
